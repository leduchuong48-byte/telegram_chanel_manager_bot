{% extends "base.html" %}

{% block content %}
<style>
    .users-layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 18px;
    }

    .panel {
        background: rgba(12, 20, 30, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 18px 40px rgba(6, 12, 18, 0.4);
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 60vh;
    }

    .panel-header {
        font-size: 14px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .user-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .user-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        font-size: 13px;
    }

    .user-meta {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .pill {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(10, 132, 255, 0.2);
        color: #cfe6ff;
    }

    .form-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-field label {
        font-size: 12px;
        color: var(--muted);
    }

    .form-field input {
        background: rgba(8, 14, 22, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 10px 12px;
        color: var(--text);
        font-size: 13px;
        outline: none;
    }

    .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: rgba(12, 20, 30, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        padding: 12px 18px;
        border-radius: 12px;
        box-shadow: 0 18px 40px rgba(6, 12, 18, 0.45);
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.2s ease;
        pointer-events: none;
    }

    .toast.show {
        opacity: 1;
        transform: translateY(0);
    }

    .btn-danger {
        color: #ff8b8b;
        border: 1px solid rgba(255, 59, 48, 0.3);
        background: rgba(255, 59, 48, 0.12);
    }

    .btn-danger:hover {
        background: rgba(255, 59, 48, 0.2);
    }

    @media (max-width: 980px) {
        .users-layout {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="users-layout">
    <section class="panel">
        <div class="panel-header">
            <span>管理员列表</span>
            <button class="btn" id="refreshBtn">刷新</button>
        </div>
        <div class="user-list" id="userList"></div>
    </section>

    <aside class="panel">
        <div class="panel-header">添加管理员</div>
        <div class="form-field">
            <label for="usernameInput">用户名</label>
            <input id="usernameInput" placeholder="例如 admin2">
        </div>
        <div class="form-field">
            <label for="passwordInput">密码</label>
            <input id="passwordInput" type="password" placeholder="请输入密码">
        </div>
        <button class="btn btn-primary" id="addUserBtn">添加</button>
        <div class="hint">密码将自动生成 bcrypt 哈希并写入配置。</div>
    </aside>
</div>

<div class="toast" id="toast"></div>
{% endblock %}

{% block extra_script %}
<script>
    const TOKEN_KEY = 'token';
    const toast = document.getElementById('toast');
    const userList = document.getElementById('userList');
    let currentUser = '';

    function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function getToken() {
        return localStorage.getItem(TOKEN_KEY);
    }

    function redirectToLogin() {
        localStorage.removeItem(TOKEN_KEY);
        window.location.href = '/login';
    }

    async function loadCurrentUser() {
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const resp = await fetch('/api/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        if (!resp.ok) {
            currentUser = '';
            return;
        }
        const data = await resp.json();
        currentUser = data.username || '';
    }

    function renderUsers(users) {
        userList.innerHTML = '';
        if (!users.length) {
            const empty = document.createElement('div');
            empty.style.color = 'var(--muted)';
            empty.style.fontSize = '12px';
            empty.textContent = '暂无管理员账号';
            userList.appendChild(empty);
            return;
        }
        users.forEach((user) => {
            const row = document.createElement('div');
            row.className = 'user-item';
            const isSelf = currentUser && user.username === currentUser;
            row.innerHTML = `
                <div class="user-meta">
                    <span>${user.username}</span>
                    ${isSelf ? '<span class="pill">当前登录</span>' : ''}
                </div>
                <button class="btn btn-danger btn-sm" ${isSelf ? 'disabled' : ''}>删除</button>
            `;
            if (!isSelf) {
                row.querySelector('button').addEventListener('click', () => deleteUser(user.username));
            }
            userList.appendChild(row);
        });
    }

    async function loadUsers() {
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const resp = await fetch('/api/users', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        if (!resp.ok) {
            showToast('加载失败');
            return;
        }
        const data = await resp.json();
        renderUsers(data.data || []);
    }

    async function addUser() {
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value.trim();
        if (!username || !password) {
            showToast('请输入用户名和密码');
            return;
        }
        const resp = await fetch('/api/users', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
            showToast(data.detail || '添加失败');
            return;
        }
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
        showToast('管理员已添加');
        await loadUsers();
    }

    async function deleteUser(username) {
        if (!confirm(`确认删除 ${username} ?`)) {
            return;
        }
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const resp = await fetch(`/api/users/${encodeURIComponent(username)}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
            showToast(data.detail || '删除失败');
            return;
        }
        showToast('管理员已删除');
        await loadUsers();
    }

    document.getElementById('refreshBtn').addEventListener('click', loadUsers);
    document.getElementById('addUserBtn').addEventListener('click', addUser);

    Promise.resolve()
        .then(loadCurrentUser)
        .then(loadUsers);
</script>
{% endblock %}
