<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap">
    <style>
        :root {
            --bg-1: #e5ecf4;
            --bg-2: #cbd6e4;
            --accent: #0a84ff;
            --accent-soft: rgba(10, 132, 255, 0.18);
            --text: #1a1f24;
            --muted: #5b6672;
            --glass: rgba(255, 255, 255, 0.64);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 24px 60px rgba(20, 28, 38, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: "SF Pro Display", "SF Pro Text", "Manrope", "Helvetica Neue", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, #f7fbff 0%, transparent 55%),
                        radial-gradient(circle at 80% 10%, #d9e6f2 0%, transparent 45%),
                        linear-gradient(145deg, var(--bg-1), var(--bg-2));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.5;
            z-index: 0;
        }

        body::before {
            background: rgba(10, 132, 255, 0.25);
            top: -120px;
            right: -80px;
        }

        body::after {
            background: rgba(90, 140, 180, 0.2);
            bottom: -140px;
            left: -80px;
        }

        .login-container {
            width: min(420px, 92vw);
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(22px);
            animation: rise 0.8s ease;
        }

        .logo-section {
            text-align: left;
            margin-bottom: 32px;
            animation: fadeIn 0.8s ease;
        }

        .logo-section h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.2px;
            margin-bottom: 8px;
        }

        .logo-section p {
            color: var(--muted);
            font-size: 14px;
        }

        .error-message {
            display: none;
            background: rgba(255, 59, 48, 0.12);
            color: #b42318;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            border: 1px solid rgba(255, 59, 48, 0.2);
        }

        .error-message.show {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.6s ease forwards;
        }

        .form-group:nth-of-type(1) {
            animation-delay: 0.1s;
        }

        .form-group:nth-of-type(2) {
            animation-delay: 0.18s;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(15, 23, 36, 0.12);
            border-radius: 14px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.9);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(10, 132, 255, 0.4);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #0a84ff 0%, #66b0ff 100%);
            color: white;
            box-shadow: 0 14px 30px rgba(10, 132, 255, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 8px;
            animation: fadeUp 0.6s ease forwards;
            animation-delay: 0.26s;
            opacity: 0;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 34px rgba(10, 132, 255, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-content.loading .btn-text {
            display: none;
        }

        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="glass-card">
            <div class="logo-section">
                <h1>Admin Panel</h1>
                <p>Telegram Bot Web Console</p>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="输入用户名"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="输入密码"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <div class="btn-content" id="btnContent">
                        <span class="btn-text">登录</span>
                        <div class="loading-spinner" id="spinner"></div>
                    </div>
                </button>
            </form>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnContent = document.getElementById('btnContent');
        const errorMessage = document.getElementById('errorMessage');
        const spinner = document.getElementById('spinner');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            loginBtn.disabled = true;
            btnContent.classList.add('loading');
            spinner.style.display = 'block';
            errorMessage.classList.remove('show');

            try {
                const body = new URLSearchParams();
                body.append('username', username);
                body.append('password', password);

                const response = await fetch('/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: body.toString(),
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.detail || '登录失败');
                }

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('username', username);
                window.location.href = '/';
            } catch (error) {
                showError(error.message || '登录失败，请重试');
                loginBtn.disabled = false;
                btnContent.classList.remove('loading');
                spinner.style.display = 'none';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
