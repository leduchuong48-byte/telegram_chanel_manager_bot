{% extends "base.html" %}

{% block content %}
<style>
    .filter-card {
        background: rgba(12, 20, 30, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 22px;
        padding: 24px;
        box-shadow: 0 20px 44px rgba(6, 12, 18, 0.45);
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 60vh;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
    }

    .form-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .form-field label {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.4px;
    }

    .form-field input,
    .form-field select {
        background: rgba(8, 14, 22, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 12px 14px;
        color: var(--text);
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-field input:focus,
    .form-field select:focus {
        border-color: rgba(10, 132, 255, 0.6);
        box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
    }

    .checkbox-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
    }

    .checkbox-item {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(8, 14, 22, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 13px;
        color: var(--text);
    }

    .toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }

    .hint {
        font-size: 12px;
        color: var(--muted);
    }

    .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: rgba(10, 16, 24, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        padding: 12px 18px;
        border-radius: 12px;
        box-shadow: 0 18px 40px rgba(6, 12, 18, 0.45);
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.2s ease;
        pointer-events: none;
    }

    .toast.show {
        opacity: 1;
        transform: translateY(0);
    }
</style>

<div class="filter-card">
    <div class="form-grid">
        <div class="form-field">
            <label for="size_limit">大小限制 (MB)</label>
            <input id="size_limit" type="number" min="0" step="0.1" placeholder="0 表示不限制">
        </div>
        <div class="form-field">
            <label for="duration_limit">时长限制 (分钟)</label>
            <input id="duration_limit" type="number" min="0" step="1" placeholder="0 表示不限制">
        </div>
        <div class="form-field">
            <label for="filter_mode">过滤模式</label>
            <select id="filter_mode">
                <option value="off">关闭</option>
                <option value="blacklist">黑名单</option>
                <option value="whitelist">白名单</option>
            </select>
        </div>
    </div>

    <div>
        <div style="font-size: 13px; color: var(--muted); margin-bottom: 10px;">媒体类型</div>
        <div class="checkbox-grid">
            <label class="checkbox-item">
                <input type="checkbox" value="video">
                视频 (Video)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" value="audio">
                音频 (Audio)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" value="photo">
                图片 (Photo)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" value="document">
                文档 (Document)
            </label>
        </div>
    </div>

    <div class="hint">大小与时长限制按“大于”逻辑处理，0 表示不限制。</div>

    <div class="toolbar">
        <button class="btn" id="refreshBtn">刷新</button>
        <button class="btn btn-primary" id="saveBtn">保存并生效</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const TOKEN_KEY = 'token';
    const sizeInput = document.getElementById('size_limit');
    const durationInput = document.getElementById('duration_limit');
    const modeSelect = document.getElementById('filter_mode');
    const toast = document.getElementById('toast');

    function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function getToken() {
        return localStorage.getItem(TOKEN_KEY);
    }

    function redirectToLogin() {
        localStorage.removeItem(TOKEN_KEY);
        window.location.href = '/login';
    }

    function getSelectedTypes() {
        const types = [];
        document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach((checkbox) => {
            if (checkbox.checked) {
                types.push(checkbox.value);
            }
        });
        return types;
    }

    function setSelectedTypes(types) {
        const set = new Set(types || []);
        document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach((checkbox) => {
            checkbox.checked = set.has(checkbox.value);
        });
    }

    async function loadConfig() {
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const resp = await fetch('/api/filters/media', {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        if (!resp.ok) {
            showToast('加载失败');
            return;
        }
        const payload = await resp.json();
        const data = payload.data || {};
        sizeInput.value = data.size_limit_mb ?? 0;
        durationInput.value = data.duration_limit_min ?? 0;
        modeSelect.value = data.filter_mode || 'off';
        setSelectedTypes(data.media_types || []);
    }

    async function saveConfig() {
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const sizeValue = parseFloat(sizeInput.value || '0');
        const durationValue = parseFloat(durationInput.value || '0');
        const payload = {
            size_limit_mb: Number.isFinite(sizeValue) ? sizeValue : 0,
            duration_limit_min: Number.isFinite(durationValue) ? durationValue : 0,
            filter_mode: modeSelect.value,
            media_types: getSelectedTypes()
        };
        const resp = await fetch('/api/filters/media', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            showToast(err.detail || '保存失败');
            return;
        }
        showToast('配置已保存并生效');
        await loadConfig();
    }

    document.getElementById('refreshBtn').addEventListener('click', loadConfig);
    document.getElementById('saveBtn').addEventListener('click', saveConfig);

    loadConfig();
</script>
{% endblock %}
