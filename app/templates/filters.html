{% extends "base.html" %}

{% block page_title %}屏蔽词管理{% endblock %}
{% block page_subtitle %}维护文本屏蔽词列表，保存后会同步到 Bot 的文本过滤策略。{% endblock %}
{% block page_mode %}page-tool{% endblock %}

{% block content %}
<style>
    .tool-page { display: flex; flex-direction: column; gap: 18px; }
    .tool-surface { background: var(--bg-panel); border: 1px solid var(--border-soft); border-radius: var(--radius-panel); box-shadow: var(--shadow-panel); padding: 22px; display: flex; flex-direction: column; gap: 16px; }
    .surface-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
    .surface-title { font-size: 15px; font-weight: 700; }
    .surface-sub, .hint { font-size: 12px; color: var(--text-faint); }
    .editor-shell { display: flex; flex-direction: column; gap: 12px; }
    .keywords-textarea {
        width: 100%;
        min-height: 460px;
        resize: vertical;
        border: 1px solid var(--border-soft);
        background: rgba(255, 255, 255, 0.94);
        color: var(--text);
        border-radius: 18px;
        padding: 16px;
        font-size: 14px;
        line-height: 1.65;
        font-family: "SFMono-Regular", "JetBrains Mono", monospace;
        outline: none;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
    }
    .keywords-textarea:focus {
        border-color: rgba(0, 113, 227, 0.26);
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.08);
    }
    .toolbar { display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }
    .toast { position: fixed; right: 24px; bottom: 24px; padding: 12px 16px; border-radius: 16px; background: rgba(15, 23, 42, 0.92); color: #fff; font-size: 13px; box-shadow: 0 18px 36px rgba(15, 23, 42, 0.18); opacity: 0; transform: translateY(8px); transition: all var(--normal) ease; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
</style>

<div class="tool-page">
    <section class="tool-surface">
        <div class="surface-head">
            <div>
                <div class="surface-title">屏蔽词列表</div>
                <div class="surface-sub">每行一个关键词。保存时会自动去重，并忽略注释行。</div>
            </div>
            <div class="toolbar">
                <button class="btn" id="refreshBtn">刷新</button>
                <button class="btn btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
        <div class="editor-shell">
            <textarea class="keywords-textarea" id="keywordsInput" placeholder="每行一个屏蔽词"></textarea>
            <div class="hint">以 `#`、`//`、`;` 开头的行会被视为注释并忽略。</div>
        </div>
    </section>
</div>

<div class="toast" id="toast"></div>

<script>
    const TOKEN_KEY = 'token';
    const keywordsInput = document.getElementById('keywordsInput');
    const toast = document.getElementById('toast');

    function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function redirectToLogin() { localStorage.removeItem(TOKEN_KEY); window.location.href = '/login'; }

    function parseKeywords() {
        const lines = keywordsInput.value.split(/\n+/);
        const seen = new Set();
        const result = [];
        lines.forEach((line) => {
            const cleaned = line.trim();
            if (!cleaned) return;
            if (cleaned.startsWith('#') || cleaned.startsWith('//') || cleaned.startsWith(';')) return;
            const key = cleaned.toLowerCase();
            if (seen.has(key)) return;
            seen.add(key);
            result.push(cleaned);
        });
        return result;
    }

    async function loadKeywords() {
        const token = getToken();
        if (!token) { redirectToLogin(); return; }
        const resp = await fetch('/api/filters/text_block', { headers: { 'Authorization': `Bearer ${token}` } });
        if (resp.status === 401) { redirectToLogin(); return; }
        if (!resp.ok) { showToast('加载失败'); return; }
        const payload = await resp.json();
        keywordsInput.value = (payload.keywords || []).join('\n');
    }

    async function saveKeywords() {
        const token = getToken();
        if (!token) { redirectToLogin(); return; }
        const keywords = parseKeywords();
        const resp = await fetch('/api/filters/text_block', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ keywords })
        });
        if (resp.status === 401) { redirectToLogin(); return; }
        if (!resp.ok) {
            const payload = await resp.json().catch(() => ({}));
            showToast(payload.detail || '保存失败');
            return;
        }
        showToast('屏蔽词已保存');
        await loadKeywords();
    }

    document.getElementById('refreshBtn').addEventListener('click', loadKeywords);
    document.getElementById('saveBtn').addEventListener('click', saveKeywords);
    loadKeywords();
</script>
{% endblock %}
