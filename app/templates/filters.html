{% extends "base.html" %}

{% block content %}
<style>
    .filter-shell {
        background: rgba(12, 20, 30, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(6, 12, 18, 0.4);
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-height: 70vh;
    }

    .filter-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
    }

    .filter-title {
        font-size: 16px;
        font-weight: 600;
    }

    .filter-sub {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
    }

    textarea {
        flex: 1;
        min-height: 420px;
        resize: vertical;
        background: rgba(8, 14, 22, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 14px;
        color: var(--text);
        font-size: 13px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        outline: none;
    }

    .hint {
        font-size: 12px;
        color: var(--muted);
    }

    .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: rgba(12, 20, 30, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text);
        padding: 12px 18px;
        border-radius: 12px;
        box-shadow: 0 18px 40px rgba(6, 12, 18, 0.45);
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.2s ease;
        pointer-events: none;
    }

    .toast.show {
        opacity: 1;
        transform: translateY(0);
    }
</style>

<div class="filter-shell">
    <div class="filter-header">
        <div>
            <div class="filter-title">屏蔽词列表</div>
            <div class="filter-sub">每行一个关键词，保存后会自动去重。</div>
        </div>
        <div class="filter-actions">
            <button class="btn" id="refreshBtn">刷新</button>
            <button class="btn btn-primary" id="saveBtn">保存</button>
        </div>
    </div>
    <textarea id="keywordsInput" placeholder="每行一个屏蔽词"></textarea>
    <div class="hint">以 # / // / ; 开头的行会被忽略。</div>
</div>

<div class="toast" id="toast"></div>

<script>
    const TOKEN_KEY = 'token';
    const keywordsInput = document.getElementById('keywordsInput');
    const toast = document.getElementById('toast');

    function showToast(message) {
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function getToken() {
        return localStorage.getItem(TOKEN_KEY);
    }

    function redirectToLogin() {
        localStorage.removeItem(TOKEN_KEY);
        window.location.href = '/login';
    }

    function parseKeywords() {
        const lines = keywordsInput.value.split(/\n+/);
        const seen = new Set();
        const result = [];
        lines.forEach((line) => {
            const cleaned = line.trim();
            if (!cleaned) return;
            if (cleaned.startsWith('#') || cleaned.startsWith('//') || cleaned.startsWith(';')) return;
            const key = cleaned.toLowerCase();
            if (seen.has(key)) return;
            seen.add(key);
            result.push(cleaned);
        });
        return result;
    }

    async function loadKeywords() {
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const resp = await fetch('/api/filters/text_block', {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        if (!resp.ok) {
            showToast('加载失败');
            return;
        }
        const payload = await resp.json();
        keywordsInput.value = (payload.keywords || []).join('\n');
    }

    async function saveKeywords() {
        const token = getToken();
        if (!token) {
            redirectToLogin();
            return;
        }
        const keywords = parseKeywords();
        const resp = await fetch('/api/filters/text_block', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ keywords })
        });
        if (resp.status === 401) {
            redirectToLogin();
            return;
        }
        if (!resp.ok) {
            const payload = await resp.json().catch(() => ({}));
            showToast(payload.detail || '保存失败');
            return;
        }
        showToast('屏蔽词已保存');
        await loadKeywords();
    }

    document.getElementById('refreshBtn').addEventListener('click', loadKeywords);
    document.getElementById('saveBtn').addEventListener('click', saveKeywords);

    loadKeywords();
</script>
{% endblock %}
